# Day22 — Docker Compose 一键启动
#
# 云端 LLM（默认，使用 .env 中通义等配置）：
#   docker compose up -d --build
#
# 本地 Ollama：
#   docker compose --profile local-llm up -d --build
#   .\scripts\ollama-pull.ps1

name: ai-project-assistant

services:
  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-net

  chroma:
    image: chromadb/chroma:1.5.9
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-net

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CHROMA_MODE: server
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-knowledge}
      MCP_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app-net

volumes:
  ollama_data:
  chroma_data:
  hf_cache:
  redis_data:

networks:
  app-net:
    driver: bridge
